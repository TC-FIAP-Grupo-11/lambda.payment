name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/FCG.Lambda.Payment/FCG.Lambda.Payment.csproj

      - name: Build
        run: dotnet build src/FCG.Lambda.Payment/FCG.Lambda.Payment.csproj --no-restore -c Release

      - name: Test
        run: dotnet test test/FCG.Lambda.Payment.Tests/FCG.Lambda.Payment.Tests.csproj -c Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/results.trx"
